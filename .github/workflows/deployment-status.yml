name: Deployment Status

on:
  push:
    branches:
      - main

jobs:
  pre-deployment:
    name: pre-deployment
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create_issue.outputs.issue_number }}
      previous_sha: ${{ steps.get_previous_sha.outputs.previous_sha }}
      current_sha: ${{ steps.get_current_sha.outputs.current_sha }}
      package_version: ${{ steps.get_package_version.outputs.package_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Get previous commit SHA
        id: get_previous_sha
        run: |
          PREVIOUS_SHA=$(git log --pretty=format:'%H' -n 2 | tail -1)
          echo "previous_sha=$PREVIOUS_SHA" >> $GITHUB_OUTPUT

      - name: Get current commit SHA
        id: get_current_sha
        run: |
          echo "current_sha=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Get package version
        id: get_package_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "package_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create deployment tracking issue
        id: create_issue
        uses: actions/github-script@v7
        with:
          script: |
            const github = require('@actions/github');
            const core = require('@actions/core');
            const { owner, repo } = github.context.repo;
            const commitSha = github.context.sha.substring(0, 8);
            const issue = await github.rest.issues.create({
              owner,
              repo,
              title: `Deployment Tracking - ${commitSha}`,
              body: `Tracking deployment for commit ${github.context.sha}.\n\n- Previous SHA: ${{ steps.get_previous_sha.outputs.previous_sha }}\n- Package version: ${{ steps.get_package_version.outputs.package_version }}\n- Triggered by: ${github.context.actor}`,
              labels: ['deployment', 'in-progress']
            });
            core.setOutput('issue_number', issue.data.number);
            console.log(`Created issue #${issue.data.number}`);

      - name: Post pre-deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            const github = require('@actions/github');
            const issueNumber = ${{ steps.create_issue.outputs.issue_number }};
            await github.rest.issues.createComment({
              owner: github.context.repo.owner,
              repo: github.context.repo.repo,
              issue_number: issueNumber,
              body: 'Pre-deployment checks completed'
            });

  rollback-preparation:
    name: rollback-preparation
    runs-on: ubuntu-latest
    needs: pre-deployment
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Create rollback artifacts directory
        run: |
          mkdir -p rollback-artifacts

      - name: Create executable rollback script
        run: |
          cat > rollback-artifacts/rollback.sh << 'EOF'
          #!/bin/bash
          set -e
          echo "🚨 Initiating rollback..."
          
          # Configuration
          PREVIOUS_COMMIT="$1"
          if [ -z "$PREVIOUS_COMMIT" ]; then
            echo "Usage: $0 <previous-commit-sha>"
            exit 1
          fi
          
          # Verify we're in a git repository
          if ! git rev-parse --git-dir > /dev/null 2>&1; then
            echo "Error: Not a git repository."
            exit 1
          fi
          
          # Fetch latest changes
          git fetch origin
          
          # Reset to previous commit (hard reset)
          git reset --hard "$PREVIOUS_COMMIT"
          
          # Clean up node_modules and reinstall
          rm -rf node_modules
          npm ci
          
          echo "✅ Rollback to $PREVIOUS_COMMIT completed."
          echo "⚠️  Remember to restart the application."
          EOF
          chmod +x rollback-artifacts/rollback.sh

      - name: Backup configuration files
        run: |
          cp package.json rollback-artifacts/package.json.backup
          cp package-lock.json rollback-artifacts/package-lock.json.backup
          # Create environment template if .env exists
          if [ -f .env ]; then
            cp .env rollback-artifacts/.env.backup
          else
            echo "# Environment variables template" > rollback-artifacts/.env.template
          fi

      - name: Create dependency verification script
        run: |
          cat > rollback-artifacts/verify-deps.sh << 'EOF'
          #!/bin/bash
          echo "🔍 Verifying dependency compatibility..."
          npm ls --depth=0 2>&1 | head -20
          if [ $? -eq 0 ]; then
            echo "✅ All dependencies are compatible."
          else
            echo "⚠️  Dependency conflicts detected."
            exit 1
          fi
          EOF
          chmod +x rollback-artifacts/verify-deps.sh

      - name: Create rollback documentation
        run: |
          cat > rollback-artifacts/ROLLBACK.md << 'EOF'
          # Rollback Procedure
          
          ## Prerequisites
          - Git installed
          - Node.js 18+
          - npm installed
          
          ## Steps
          1. Stop the running application.
          2. Run the rollback script: `./rollback.sh <previous-commit-sha>`
          3. Restart the application.
          
          ## Verification
          - Run the verification script: `./verify-deps.sh`
          - Run tests: `npm test`
          
          ## Troubleshooting
          If rollback fails due to conflicts, manually reset:
          ```
          git fetch origin
          git reset --hard <previous-commit-sha>
          rm -rf node_modules
          npm ci
          ```
          EOF

      - name: Create compressed rollback package
        run: |
          tar -czf rollback-package-${{ github.sha }}.tar.gz rollback-artifacts/
          sha256sum rollback-package-${{ github.sha }}.tar.gz > rollback-package-${{ github.sha }}.tar.gz.sha256

      - name: Upload rollback artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rollback-package-${{ github.sha }}
          path: |
            rollback-package-${{ github.sha }}.tar.gz
            rollback-package-${{ github.sha }}.tar.gz.sha256
          retention-days: 30

      - name: Get SHA256 checksum
        id: checksum
        run: |
          CHECKSUM=$(cat rollback-package-${{ github.sha }}.tar.gz.sha256 | cut -d' ' -f1)
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT

      - name: Post rollback plan comment
        uses: actions/github-script@v7
        with:
          script: |
            const github = require('@actions/github');
            const issueNumber = ${{ needs.pre-deployment.outputs.issue_number }};
            const previousSha = '${{ needs.pre-deployment.outputs.previous_sha }}';
            const currentSha = '${{ needs.pre-deployment.outputs.current_sha }}';
            const packageVersion = '${{ needs.pre-deployment.outputs.package_version }}';
            const artifactName = 'rollback-package-${{ github.sha }}';
            const checksum = '${{ steps.checksum.outputs.checksum }}';
            
            const body = `
### 🔄 Rollback Plan Ready

- Previous Commit: ${previousSha}
- Current Commit: ${currentSha}
- Package Version: ${packageVersion}
- Artifact: ${artifactName}

#### Rollback Components Prepared:
✅ Executable rollback script with error handling  
✅ Configuration backups (package.json, package-lock.json, environment templates)  
✅ Dependency verification script for compatibility checking  
✅ Detailed rollback documentation with step-by-step instructions  
✅ Compressed rollback package with SHA256 checksums  

#### Quick Rollback Command:
\`\`\`bash
# Download artifact and extract
curl -L -o ${artifactName}.tar.gz "https://github.com/${github.context.repo.owner}/${github.context.repo.repo}/suites/actions/runs/${{ github.run_id }}/artifacts"
tar -xzf ${artifactName}.tar.gz
cd rollback-artifacts
./rollback.sh ${previousSha}
\`\`\`

#### Verification Status:
- Rollback script created: true
- Configuration backup: true
- SHA256: ${checksum}
            `;
            
            await github.rest.issues.createComment({
              owner: github.context.repo.owner,
              repo: github.context.repo.repo,
              issue_number: issueNumber,
              body
            });

  post-deployment:
    name: post-deployment
    runs-on: ubuntu-latest
    needs: [pre-deployment, rollback-preparation]
    steps:
      - name: Update issue labels
        uses: actions/github-script@v7
        with:
          script: |
            const github = require('@actions/github');
            const issueNumber = ${{ needs.pre-deployment.outputs.issue_number }};
            await github.rest.issues.update({
              owner: github.context.repo.owner,
              repo: github.context.repo.repo,
              issue_number: issueNumber,
              labels: ['deployment', 'completed']
            });

      - name: Post final comment
        uses: actions/github-script@v7
        with:
          script: |
            const github = require('@actions/github');
            const issueNumber = ${{ needs.pre-deployment.outputs.issue_number }};
            const artifactName = 'rollback-package-${{ github.sha }}';
            const checksum = '${{ needs.rollback-preparation.outputs.checksum }}';
            
            await github.rest.issues.createComment({
              owner: github.context.repo.owner,
              repo: github.context.repo.repo,
              issue_number: issueNumber,
              body: `## Deployment Completed Successfully\n\nRollback artifacts are available as \`${artifactName}\` with SHA256: ${checksum}.`
            });

      - name: Close deployment issue
        uses: actions/github-script@v7
        with:
          script: |
            const github = require('@actions/github');
            const issueNumber = ${{ needs.pre-deployment.outputs.issue_number }};
            await github.rest.issues.update({
              owner: github.context.repo.owner,
              repo: github.context.repo.repo,
              issue_number: issueNumber,
              state: 'closed'
            });
